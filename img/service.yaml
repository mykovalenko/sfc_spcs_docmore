spec:
  containers:
    - name: dep-&{ depname }
      image: &{ accname }.registry.snowflakecomputing.com/&{ dbsname }/&{ depname }/images/dep-&{ depname }:latest
      resources:
        requests:
          nvidia.com/gpu: 1
        limits:
          nvidia.com/gpu: 1
      volumeMounts:
        - name: volume-stage
          mountPath: /opt/spcs/stage/
        - name: models-stage
          mountPath: /root/.ollama/models/
  endpoints:
    - name: dep-&{ depname }
      port: 8501
      public: true
  volumes:
    - name: volume-stage
      source: "@volumes"
      uid: 1000
      gid: 1000
    - name: models-stage
      source: "@models"
      uid: 1000
      gid: 1000
serviceRoles:
  - name: &{ depname }_RAX
    endpoints:
    - dep-&{ depname }
